<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ONE MORE</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B0B0B;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    /* Карточка (бело-серая, без зелени) */
    .card {
      max-width: 400px;
      width: 100%;
      background: #1C1C1E;
      border-radius: 32px;
      padding: 36px 28px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
      transition: all 0.2s ease;
    }

    /* Заголовок */
    .card h2 {
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    /* Основной текст */
    .card p {
      color: #8E8E93;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card .highlight {
      color: #F2F2F7;
      font-weight: 500;
    }

    /* Блок с VPN (серый) */
    .vpn-block {
      background: #2C2C2E;
      border-radius: 16px;
      padding: 14px 18px;
      margin: 16px 0 22px;
      border-left: 3px solid #8E8E93;
      text-align: left;
    }

    .vpn-block p {
      margin: 0;
      font-size: 14px;
      color: #AEAEB2;
    }

    .vpn-block strong {
      color: #FFFFFF;
    }

    /* Кнопка (белая, без зелени) */
    .btn-go {
      display: inline-block;
      background: #FFFFFF;
      color: #000000;
      border: none;
      padding: 16px 32px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 16px rgba(255, 255, 255, 0.05);
      letter-spacing: 0.01em;
    }

    .btn-go:hover {
      background: #F2F2F7;
      transform: scale(1.01);
      box-shadow: 0 8px 28px rgba(255, 255, 255, 0.08);
    }

    .btn-go:active {
      transform: scale(0.98);
      background: #E5E5EA;
    }

    /* Лёгкая пульсация (светлая) */
    @keyframes pulse-light {
      0% { box-shadow: 0 4px 16px rgba(255, 255, 255, 0.02); }
      50% { box-shadow: 0 4px 28px rgba(255, 255, 255, 0.08); }
      100% { box-shadow: 0 4px 16px rgba(255, 255, 255, 0.02); }
    }

    .btn-go {
      animation: pulse-light 2.4s infinite ease-in-out;
    }

    /* Декоративные размытые пятна (серые) */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }
    .blob-1 {
      width: 320px;
      height: 320px;
      background: #4A4A4A;
      top: -100px;
      left: -100px;
    }
    .blob-2 {
      width: 420px;
      height: 420px;
      background: #3A3A3C;
      bottom: -150px;
      right: -150px;
      opacity: 0.08;
    }

    /* Адаптация под светлую тему (iOS / браузер) */
    @media (prefers-color-scheme: light) {
      body { background: #F2F2F7; }
      .card { background: #FFFFFF; border-color: rgba(0,0,0,0.03); box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
      .card h2 { color: #000000; }
      .card p { color: #6C6C70; }
      .vpn-block { background: #F2F2F7; border-left-color: #8E8E93; }
      .vpn-block p { color: #55555A; }
      .vpn-block strong { color: #000000; }
      .btn-go { background: #000000; color: #FFFFFF; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
      .btn-go:hover { background: #1C1C1E; }
      .btn-go:active { background: #333333; }
    }
  </style>
</head>
<body>

  <!-- Декоративные пятна -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Карточка -->
  <div class="card" role="dialog" aria-labelledby="modal-title">
    <h2 id="modal-title">🤫 Наш сервер сейчас отдыхает за границей</h2>
    <p>
      Приложение <strong>ONE MORE</strong> временно работает на бесплатном зарубежном сервере.<br />
      Из-за этого скорость загрузки может быть ниже обычной.
    </p>

    <div class="vpn-block">
      <p>
        🌍 <strong>Для быстрой и стабильной работы</strong> рекомендуем включить <span class="highlight">VPN</span>.
      </p>
    </div>

    <p style="font-size: 14px; color: #8E8E93; margin-bottom: 24px;">
      Спасибо за терпение — мы уже работаем над переездом в Россию! 🇷🇺
    </p>

    <button class="btn-go" onclick="goToApp()">
      🚀 Перейти в приложение
    </button>
  </div>

  <script>
    function goToApp() {
      // ЗДЕСЬ ТВОЯ РЕАЛЬНАЯ ССЫЛКА (замени, если нужно)
      window.location.href = "https://fitness-diary-app-three.vercel.app";
    }

    // Автоматический переход через 3 секунды (раскомментируй, если надо)
    // setTimeout(goToApp, 3000);
  </script>
</body>
</html>

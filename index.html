<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ONE MORE</title>
  <style>
    /* Полный сброс */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Всегда чёрный фон, даже если в системе светлая тема */
    html, body {
      min-height: 100vh;
      background: #0B0B0B !important;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    /* Карточка (тёмная, без влияния темы системы) */
    .card {
      max-width: 400px;
      width: 100%;
      background: #1C1C1E;
      border-radius: 32px;
      padding: 36px 28px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    /* Заголовок — белый */
    .card h2 {
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    /* Основной текст — серый */
    .card p {
      color: #8E8E93;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card .highlight {
      color: #F2F2F7;
      font-weight: 500;
    }

    /* VPN-блок (тёмно-серый) */
    .vpn-block {
      background: #2C2C2E;
      border-radius: 16px;
      padding: 14px 18px;
      margin: 16px 0 22px;
      border-left: 3px solid #8E8E93;
      text-align: left;
    }

    .vpn-block p {
      margin: 0;
      font-size: 14px;
      color: #AEAEB2;
    }

    .vpn-block strong {
      color: #FFFFFF;
    }

    /* Кнопка — белая, без зелени */
    .btn-go {
      display: inline-block;
      background: #FFFFFF;
      color: #000000;
      border: none;
      padding: 16px 32px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 4px 16px rgba(255, 255, 255, 0.05);
      letter-spacing: 0.01em;
    }

    .btn-go:hover {
      background: #F2F2F7;
      transform: scale(1.01);
      box-shadow: 0 8px 28px rgba(255, 255, 255, 0.08);
    }

    .btn-go:active {
      transform: scale(0.98);
      background: #E5E5EA;
    }

    /* Пульсация (белая) */
    @keyframes pulse-light {
      0% { box-shadow: 0 4px 16px rgba(255, 255, 255, 0.02); }
      50% { box-shadow: 0 4px 28px rgba(255, 255, 255, 0.08); }
      100% { box-shadow: 0 4px 16px rgba(255, 255, 255, 0.02); }
    }

    .btn-go {
      animation: pulse-light 2.4s infinite ease-in-out;
    }

    /* Декоративные размытые пятна (серые) */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
    }
    .blob-1 {
      width: 320px;
      height: 320px;
      background: #2A2A2A;
      top: -100px;
      left: -100px;
      opacity: 0.3;
    }
    .blob-2 {
      width: 420px;
      height: 420px;
      background: #222222;
      bottom: -150px;
      right: -150px;
      opacity: 0.2;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card" role="dialog" aria-labelledby="modal-title">
    <h2 id="modal-title">🤫 Наш сервер сейчас отдыхает за границей</h2>
    <p>
      Приложение <strong>ONE MORE</strong> временно работает на бесплатном зарубежном сервере.<br />
      Из-за этого скорость загрузки может быть ниже обычной.
    </p>

    <div class="vpn-block">
      <p>
        🌍 <strong>Для быстрой и стабильной работы</strong> рекомендуем включить <span class="highlight">VPN</span>.
      </p>
    </div>

    <p style="font-size: 14px; color: #8E8E93; margin-bottom: 24px;">
      Спасибо за терпение — мы уже работаем над переездом в Россию! 🇷🇺
    </p>

    <button class="btn-go" onclick="goToApp()">
      🚀 Перейти в приложение
    </button>
  </div>

  <script>
    function goToApp() {
      window.location.href = "https://fitness-diary-app-three.vercel.app";
    }
  </script>
</body>
</html>
